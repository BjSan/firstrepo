<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First GitHub Repo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
      cursor: pointer;
    }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      pointer-events: none;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">Klick um die Farbe zu ändern</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = [
      '#ff4757', '#ff6b81', '#ff7f50',
      '#ffa502', '#eccc68', '#7bed9f',
      '#2ed573', '#1e90ff', '#70a1ff',
      '#5352ed', '#a29bfe', '#fd79a8',
      '#e84393', '#00cec9', '#00b894'
    ];

    let colorIndex = 0;

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      r: 40,
      dx: 3.5,
      dy: 2.8,
      color: colors[0],
      targetColor: colors[0],
      glowSize: 20,
    };

    function lerpColor(a, b, t) {
      const parse = hex => [
        parseInt(hex.slice(1, 3), 16),
        parseInt(hex.slice(3, 5), 16),
        parseInt(hex.slice(5, 7), 16)
      ];
      const ca = parse(a), cb = parse(b);
      const r = Math.round(ca[0] + (cb[0] - ca[0]) * t);
      const g = Math.round(ca[1] + (cb[1] - ca[1]) * t);
      const bv = Math.round(ca[2] + (cb[2] - ca[2]) * t);
      return `rgb(${r},${g},${bv})`;
    }

    let currentColor = ball.color;
    let lerpT = 1;

    let particles = [];

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 18; i++) {
        const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.3;
        const speed = 2 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 4 + Math.random() * 4,
          color,
          alpha: 1,
          life: 1,
        });
      }
    }

    canvas.addEventListener('click', () => {
      colorIndex = (colorIndex + 1) % colors.length;
      ball.targetColor = colors[colorIndex];
      lerpT = 0;
      spawnParticles(ball.x, ball.y, ball.targetColor);

      setTimeout(() => { hint.style.opacity = '0'; }, 2000);
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    let trail = [];

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw trail
      for (let i = 0; i < trail.length; i++) {
        const t = trail[i];
        const alpha = (i / trail.length) * 0.3;
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.r * (i / trail.length), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${hexToRgb(currentColor)},${alpha})`;
        ctx.fill();
      }

      // Draw particles
      particles = particles.filter(p => p.alpha > 0.02);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.alpha *= 0.94;
        p.r *= 0.97;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${hexToRgb(p.color)},${p.alpha})`;
        ctx.fill();
      }

      // Color lerp
      if (lerpT < 1) {
        lerpT = Math.min(lerpT + 0.05, 1);
        currentColor = lerpColor(currentColor, ball.targetColor, lerpT);
      }

      // Glow
      const glow = ctx.createRadialGradient(ball.x, ball.y, ball.r * 0.5, ball.x, ball.y, ball.r + ball.glowSize);
      glow.addColorStop(0, `rgba(${hexToRgb(currentColor)},0.4)`);
      glow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r + ball.glowSize, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Ball
      const grad = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.1, ball.x, ball.y, ball.r);
      grad.addColorStop(0, '#ffffff88');
      grad.addColorStop(0.3, currentColor);
      grad.addColorStop(1, '#00000088');
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Move
      trail.push({ x: ball.x, y: ball.y });
      if (trail.length > 18) trail.shift();

      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.x + ball.r > canvas.width || ball.x - ball.r < 0) ball.dx *= -1;
      if (ball.y + ball.r > canvas.height || ball.y - ball.r < 0) ball.dy *= -1;

      requestAnimationFrame(draw);
    }

    function hexToRgb(hex) {
      if (hex.startsWith('rgb')) {
        return hex.slice(4, -1);
      }
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }

    draw();
  </script>
</body>
</html>
